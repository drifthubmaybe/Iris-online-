<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Online Players</title>
  <style>
    * { font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0e14; color: #e0e6f0; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #00ff88; }
    .live-indicator { display: inline-block; width: 12px; height: 12px; background: #00ff88; border-radius: 50%; animation: pulse 1s infinite; margin-right: 8px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .player-list { margin-top: 1.5rem; background: #141c2b; border-radius: 12px; padding: 1rem; }
    .player-item { display: flex; justify-content: space-between; padding: 0.6rem 0.4rem; border-bottom: 1px solid #1e2a3f; }
    .player-item:last-child { border-bottom: none; }
    .status { font-weight: bold; }
    .online { color: #00ff88; }
    .offline { color: #ff4455; }
    .timestamp { color: #6a7a94; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">
  <h1><span class="live-indicator"></span> Live Players</h1>
  <p style="color: #6a7a94; margin-bottom: 1rem;">Refresh every 0.5s – only players with recent heartbeat</p>
  <div id="playerList" class="player-list">
    <div style="text-align:center; padding:1rem; color:#6a7a94;">Loading...</div>
  </div>
</div>

<script>
  async function fetchOnline() {
    try {
      const res = await fetch('/api/online');
      const data = await res.json();
      const list = data.online || [];

      const container = document.getElementById('playerList');
      if (list.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:1rem; color:#6a7a94;">No players online</div>`;
        return;
      }

      // Sort alphabetically
      list.sort();
      container.innerHTML = list.map(name => `
        <div class="player-item">
          <span>${escapeHtml(name)}</span>
          <span class="status online">● Online</span>
        </div>
      `).join('');
    } catch (e) {
      console.error(e);
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Refresh every 500ms
  fetchOnline();
  setInterval(fetchOnline, 500);
</script>
</body>
</html>
